<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>.:: MigrationExecutor ::.</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Inter',sans-serif;
        }

        .bg-grid {
            background-color: #f8fafc;
            background-image: linear-gradient(#e5e7eb 1px,transparent 1px), linear-gradient(90deg,#e5e7eb 1px,transparent 1px);
            background-size: 40px 40px;
        }

        .card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,.05);
            transition: all .2s;
        }

            .card:hover {
                box-shadow: 0 8px 20px rgba(0,0,0,.05);
            }

        #pingStatus {
            position: fixed !important;
            top: 100px;
            right: 200px;
            z-index: 9999;
        }

        .fade-out {
            animation: fadeOut 3s ease forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }

            70% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }
    </style>
</head>
<body style="background-color: #0b2454;" class="min-h-screen p-2">
    <div class="max-w-7xl mx-auto bg-white rounded-md shadow-x overflow-hidden">

        <!-- NAVBAR -->
        <header class="flex justify-between items-center border-b border-gray-200 py-1">
            <!-- Parte izquierda azul solo para el logo -->
            <div class="flex items-center gap-3 px-6 py-4 bg-[#0b2555] rounded-r-md">

                <img src="sistran.webp" alt="Sistran Logo" class="h-8 w-auto">
            </div>

            <!-- Parte derecha blanca con botones y nav -->
            <div class="flex-1 flex justify-between items-center px-6 py-4 bg-white">
                <div class="flex items-center gap-3">
                    <i class="bi bi-database text-[#0b2555] text-2xl"></i>
                    <span class="font-semibold text-lg text-gray-800">MigrationExecutor</span>
                </div>

                <nav class="hidden md:flex gap-6 text-sm text-gray-600">
                    <a href="#">Excel Report</a>
                    <a href="./swagger">Swagger</a>
                </nav>

                <div class="flex gap-3 relative">
                    <button id="pingApiBtn" class="px-4 py-2 text-sm border rounded-lg" title="Verifica que la API esté funcionando correctamente.">
                        <i class="bi bi-heart-pulse-fill text-green-500 text-2xl"></i>
                        API Health Check
                    </button>

                    <button id="runMigrationBtnHeader" class="px-4 py-2 text-sm bg-[#0b2555] text-white rounded-lg">
                        Documentation
                    </button>
                </div>
                <p id="pingStatus"
                   class="text-sm rounded-lg shadow-md border bg-white pointer-events-none">
                </p>
            </div>
        </header>

        <!-- CONTENT -->
        <main class="px-4 py-4 space-y-2">
            <!-- HERO -->
            <section>
                <h1 class="text-2xl font-bold text-gray-800">
                    Sistran Migration Executor Dashboard
                </h1>
                <p class="text-gray-500 mt-1">
                    Sistema de ejecución de paquetes de migración
                </p>
            </section>

            <!-- ACTION CARDS -->
            <section class="grid md:grid-cols-2 gap-6">
                <!-- RUN MIGRATION -->
                <div class="card">
                    <div class="flex items-center gap-3 mb-1">
                        <i class="bi bi-play-circle-fill text-blue-600 text-2xl"></i>
                        <h3 class="font-semibold text-gray-800">
                            Run Migration
                        </h3>
                    </div>

                    <span class="text-gray-500 text-sm mb-3">
                        Define paquetes a incluir/omitir, por medio del JSON.
                    </span>

<textarea id="jsonInput" class="w-full h-32 border rounded-lg p-3 text-xs bg-gray-100">
{"nombre":"MigracionDinamica", "paquetesIncluir":[], "paquetesOmitir":[]}</textarea>

                    <button id="runMigrationBtn" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg">
                        Run Migration
                    </button>
                    <button id="formatJsonBtn" class="mt-2 w-full bg-gray-200 hover:bg-gray-300 text-gray-800 py-2 rounded-lg">
                        Formatear JSON
                    </button>
                    <p id="statusMsg" class="text-sm mt-2"></p>
                </div>

                <!-- API CARD -->
                <div class="card">
                    <div class="flex items-center gap-3 mb-3">
                        <i class="bi bi-speedometer text-blue-600 text-2xl"></i>
                        <h3 class="font-semibold text-gray-800">Progress</h3>
                    </div>
                    <p class="text-gray-500 text-sm mb-4">Informe de progreso de la migración en tiempo real:</p>

                    <!-- Barra de progreso -->
                    <div class="w-full bg-gray-200 rounded-full h-5 mb-2 overflow-hidden">
                        <div id="progressBar" class="bg-blue-600 h-5 w-0 transition-all"></div>
                    </div>
                    <p id="progressText" class="text-sm text-gray-700">0%</p>
                </div>

            </section>

            <!-- LOGS -->
            <section class="card">
                <div class="flex justify-between items-center mb-4">

                    <!-- TÍTULO -->
                    <h2 class="text-xl font-semibold">Migration Logs</h2>

                    <!-- PAGINACIÓN -->
                    <div class="flex items-center gap-2">
                        <button id="prevPage" class="px-3 py-1 bg-gray-200 rounded-lg text-sm">
                            Anterior
                        </button>

                        <span id="pageInfo" class="text-sm text-gray-500"></span>

                        <button id="nextPage" class="px-3 py-1 bg-gray-200 rounded-lg text-sm">
                            Siguiente
                        </button>
                    </div>

                </div>

                <!-- LISTA -->
                <ul id="migrationList" class="space-y-3"></ul>
            </section>


        </main>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.0/signalr.min.js"></script>
    <script>


        const pingBtn = document.getElementById("pingApiBtn"); //llamar API
        const pingStatus = document.getElementById("pingStatus"); //llamar API

        let allLinks = []
        let currentPage = 1
        const pageSize = 3

        async function loadLogs() {

            const url = "./LogMigration/"
            const list = document.getElementById("migrationList")

            list.innerHTML = "Loading..."

            try {

                const res = await fetch(url)
                const html = await res.text()

                const parser = new DOMParser()
                const doc = parser.parseFromString(html, "text/html")

                allLinks = [...doc.querySelectorAll("a")]
                    .map(a => a.getAttribute("href"))
                    .filter(href => href && href.endsWith(".json"))

                allLinks.sort().reverse()

                renderPage()

            } catch (err) {
                list.innerHTML = "Error loading logs"
            }
        }

        async function renderPage() {

            const list = document.getElementById("migrationList")

            list.innerHTML = ""

            const start = (currentPage - 1) * pageSize
            const end = start + pageSize
            const pageLinks = allLinks.slice(start, end)

            for (const file of pageLinks) {

                const url = "./LogMigration/"
                const data = await fetch(url + file).then(r => r.json())
                const ok = data.Fallidos === 0
                const li = document.createElement("li")

                li.className = "border rounded-lg p-4 bg-gray-50"
                li.innerHTML = `
                    <div class="flex justify-between">
                        <div>
                            <div class="font-semibold">${data.NombreJob}</div>

                            <div class="text-xs text-gray-500">
                            ${data.Generado} · pasos ${data.TotalPasos}
                            </div>
                        </div>

                        <div class="flex items-center gap-3">
                            <span class="text-xs px-2 py-1 rounded ${ok ? "bg-green-600 text-white" : "bg-red-600 text-white"}">
                                ${ok ? "SUCCESS" : "FAILED"}
                            </span>

                            <span class="text-xs text-gray-500">
                            ✔ ${data.Exitos} / ✖ ${data.Fallidos}
                            </span>

                            <a href="${url}${file}" target="_blank"
                            class="text-blue-600 text-xs">
                            View
                            </a>

                            <a href="${url}${data.ExcelPath}" target="_blank"
                            class="text-blue-600 text-xs">
                            Excel Report
                            </a>

                        </div>
                    </div>
                    `

                list.appendChild(li)

            }

            const pageInfo = document.getElementById("pageInfo")
            pageInfo.textContent = `Página ${currentPage} de ${Math.ceil(allLinks.length / pageSize)}`

        }

        document.getElementById("prevPage").onclick = () => {
            if (currentPage > 1) {
                currentPage--
                renderPage()
            }
        }

        document.getElementById("nextPage").onclick = () => {
            if (currentPage * pageSize < allLinks.length) {
                currentPage++
                renderPage()
            }
        }

        const runBtn = document.getElementById("runMigrationBtn")
        const jsonInput = document.getElementById("jsonInput")
        const statusMsg = document.getElementById("statusMsg")

        runBtn.addEventListener('click', async () => {

            let payload;

            try {
                payload = JSON.parse(jsonInput.value);
            } catch {
                statusMsg.textContent = "❌ JSON inválido";
                statusMsg.className = "mt-2 text-sm text-red-500";
                return;
            }

            statusMsg.textContent = "⏳ Ejecutando...";
            statusMsg.className = "mt-2 text-sm text-yellow-500";

            try {

                const res = await fetch('./api/Migration/run-job-from-folderm', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                /* RESPUESTA EXITOSA */
                if (res.status >= 200 && res.status < 300) {

                    statusMsg.textContent = `✅ Migración ejecutada (HTTP ${res.status})`;
                    statusMsg.className = "mt-2 text-sm text-green-500";
                    return;
                }

                /* ERRORES HTTP */
                const errorText = await res.text();
                statusMsg.textContent = `❌ Error HTTP ${res.status}: ${errorText}`;
                statusMsg.className = "mt-2 text-sm text-red-500";

            }
            catch (err) {
                statusMsg.textContent = "❌ Error de conexión: " + err.message;
                statusMsg.className = "mt-2 text-sm text-red-500";
            }

        });

        loadLogs()

        setInterval(loadLogs, 15000)



        //LLamar API
        pingBtn.addEventListener("click", async () => {
            pingStatus.textContent = "⏳ Verificando...";
            pingStatus.className = "mt-2 text-sm text-yellow-500";

            try {
                const res = await fetch("./api/migration/ping");
                if (res.ok) {
                    const text = await res.text(); // O json() si tu API devuelve JSON
                    pingStatus.textContent = `✅ API OK: ${text}`;
                    pingStatus.className = "mt-2 text-sm text-green-500";
                } else {
                    pingStatus.textContent = `❌ Error HTTP ${res.status}`;
                    pingStatus.className = "mt-2 text-sm text-red-500";
                }
            } catch (err) {
                pingStatus.textContent = `❌ Error de conexión: ${err.message}`;
                pingStatus.className = "mt-2 text-sm text-red-500";
            }

            //
            pingStatus.classList.remove("fade-out");
            void pingStatus.offsetWidth;
            pingStatus.classList.add("fade-out");
        });


        const formatBtn = document.getElementById("formatJsonBtn");

        formatBtn.addEventListener("click", () => {
            try {
                const json = JSON.parse(jsonInput.value); // Parsea el JSON
                jsonInput.value = JSON.stringify(json, null, 4); // Indenta 4 espacios
                statusMsg.textContent = "✅ JSON formateado correctamente";
                statusMsg.className = "mt-2 text-sm text-green-500";
            } catch (err) {
                statusMsg.textContent = "❌ JSON inválido: " + err.message;
                statusMsg.className = "mt-2 text-sm text-red-500";
            }
        });


        //====================================USO DE WASM====================================
        // Crear conexión SignalR
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/migrationHub")
            .withAutomaticReconnect()
            .build();

        // Elementos de progreso
        const progressBar = document.getElementById("progressBar");
        const progressText = document.getElementById("progressText");

        // Función para actualizar la barra
        function updateProgress(progress, stepName) {
            progressBar.style.width = progress + "%";
            progressText.textContent = `${progress.toFixed(0)}% - ${stepName}`;
        }

        // Conexión a eventos desde el servidor
        connection.on("ReceiveProgress", (progress, stepName) => {
            progressBar.style.width = progress + "%";
            progressText.textContent = `${progress.toFixed(0)}% - ${stepName}`;
        });

        // Iniciar conexión
        connection.start()
            .then(() => console.log("Conectado a MigrationHub"))
            .catch(err => console.error(err.toString()));
    </script>

</body>
</html>
